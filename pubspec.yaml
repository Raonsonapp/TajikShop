name: tajikshop
description: TajikShop Marketplace App - Бозори Тоҷикистон
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/product.png
    - assets/banner.jpg
    - assets/user.png
