name: Flutter Auto Setup (All Platforms)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # 3. Generate valid name
      - name: Fix project name
        run: |
          NAME=$(basename $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]' | tr '-' '_' )
          echo "PROJECT_NAME=$NAME" >> $GITHUB_ENV

      # 4. Enable platforms
      - run: |
          flutter config --enable-web
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      # 5. Create project (АГАР НЕСТ)
      - name: Create project if missing
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --project-name $PROJECT_NAME temp_app
            cp -r temp_app/* .
            rm -rf temp_app
          fi

      # 6. FIX МУҲИМ: regenerate platforms БЕ ХАТО
      - name: Generate platforms safely
        run: flutter create --project-name $PROJECT_NAME .

      # 7. Dependencies
      - run: flutter pub get

      # 8. Fix pubspec
      - name: Fix pubspec name
        run: |
          sed -i "s/^name: .*/name: $PROJECT_NAME/" pubspec.yaml || true

      # 9. Commit
      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "Auto setup Flutter بالكامل (fixed name issue)" || echo "No changes"
          git push
