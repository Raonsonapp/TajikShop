name: Get Android SHA Keys

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Ин имкон медиҳад, ки тугмачаи "Run" пайдо шавад

jobs:
  get_sha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get SHA Keys
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport | grep -E "Variant|SHA1|SHA-256"
