name: Android Debug Build & SHA Keys

on:
  push:
    branches: [ "main" ] # Вақте кодро ба branch-и main мепартоед, кор мекунад
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Extract SHA-1 and SHA-256
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport | grep -E "Variant|SHA1|SHA-256"
