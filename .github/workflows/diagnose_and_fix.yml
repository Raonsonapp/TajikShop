name: 🔬 Deep Code Analysis — White/Grey Screen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyse:
    name: Таҳлили дақиқи код — экрани сафед/хокистарӣ
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 1 — МУШКИЛИ АСОСӢ: Material3 + TextField filled:true
      # ════════════════════════════════════════════════════════════════════════
      - name: "🎯 BUG #1 — Material3 TextField fillColor ignored (MAIN CAUSE)"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #1 — САБАБИ АСОСИИ ЭКРАНИ ХОКИСТАРӢ                  ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          FOUND=0

          # login_screen.dart: filled:true + fillColor дорад, аммо Material3 онро НОДИДА мегирад
          while IFS= read -r file; do
            # Санҷиш: filled:true бо fillColor дар InputDecoration
            if grep -q "filled: true" "$file"; then
              LINES=$(grep -n "filled: true\|fillColor:" "$file")
              HAS_BORDER_NONE=$(grep -c "border: InputBorder.none\|BorderSide.none" "$file" || true)
              echo "📄 ФАЙЛ: $file"
              echo "$LINES" | while IFS= read -r line; do echo "   $line"; done
              echo ""
              if [ "$HAS_BORDER_NONE" -gt 0 ]; then
                echo "   ❌ МУШКИЛ: filled:true + border:none + useMaterial3:true"
                echo "   ➤  Material3 fillColor-ро АЗ THEME мегирад (colorScheme.surfaceContainerHighest)"
                echo "   ➤  Дар light theme ин = Colors.grey[200] → ХОКИСТАРӢ!"
                echo "   ➤  fillColor дар InputDecoration нодида гирифта мешавад."
                FOUND=1
              fi
              echo "   ─────────────────────────────────────────────────────"
            fi
          done < <(find lib/ -name "*.dart" | grep -v test)

          echo ""
          echo "  📌 САТРҲОИ МУШКИЛДОР:"
          grep -rn "filled: true" lib/ --include="*.dart" | grep -v "//"
          echo ""
          echo "  ✅ ИСЛОҲИ ДУРУСТ — яке аз инҳо:"
          echo "     1) filled: false  (Container ранг медиҳад, TextField не)"
          echo "     2) fillColor: Colors.transparent  (Container зоҳир мешавад)"
          echo "     3) useMaterial3: false  дар ThemeData (тавсия намешавад)"
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 2 — app_theme.dart: lightTheme inputDecorationTheme надорад
      # ════════════════════════════════════════════════════════════════════════
      - name: "🎨 BUG #2 — lightTheme missing inputDecorationTheme"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #2 — lightTheme inputDecorationTheme надорад           ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          THEME_FILE="lib/core/theme/app_theme.dart"

          DARK_HAS=$(grep -A 80 "get darkTheme" "$THEME_FILE" | grep -c "inputDecorationTheme" || true)
          LIGHT_HAS=$(grep -A 80 "get lightTheme" "$THEME_FILE" | grep -c "inputDecorationTheme" || true)

          echo "  darkTheme  inputDecorationTheme: $([ "$DARK_HAS" -gt 0 ] && echo '✅ бор аст' || echo '❌ нест')"
          echo "  lightTheme inputDecorationTheme: $([ "$LIGHT_HAS" -gt 0 ] && echo '✅ бор аст' || echo '❌ нест')"
          echo ""

          if [ "$LIGHT_HAS" -eq 0 ]; then
            echo "  ❌ МУШКИЛ:"
            echo "     lightTheme бе inputDecorationTheme → Flutter default = Colors.grey[200]"
            echo "     Агар телефон light mode бошад → ҳамаи TextField-ҳо ХОКИСТАРӢ!"
            echo ""
            echo "  📌 main.dart-да themeMode:"
            grep -n "themeMode\|ThemeMode" lib/main.dart || true
            echo ""
            echo "  📌 theme_provider.dart default:"
            grep -n "ThemeMode\.\|state =" lib/providers/theme_provider.dart || true
            echo ""
            echo "  ✅ ИСЛОҲ: lightTheme-га илова кун:"
            echo "    inputDecorationTheme: InputDecorationTheme(filled:true, fillColor: Color(0xFF141420))"
          fi
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 3 — colorScheme.surfaceContainerHighest танзим нашудааст
      # ════════════════════════════════════════════════════════════════════════
      - name: "🎨 BUG #3 — Material3 surfaceContainerHighest not set"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #3 — colorScheme.surfaceContainerHighest               ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          THEME_FILE="lib/core/theme/app_theme.dart"

          LIGHT_SCH=$(grep -A 20 "ColorScheme.light" "$THEME_FILE" | grep -c "surfaceContainerHighest\|surfaceVariant" || true)
          DARK_SCH=$(grep -A 20 "ColorScheme.dark" "$THEME_FILE" | grep -c "surfaceContainerHighest\|surfaceVariant" || true)

          echo "  darkTheme  surfaceContainerHighest: $([ "$DARK_SCH" -gt 0 ] && echo '✅' || echo '❌ нест')"
          echo "  lightTheme surfaceContainerHighest: $([ "$LIGHT_SCH" -gt 0 ] && echo '✅' || echo '❌ нест')"
          echo ""

          if [ "$LIGHT_SCH" -eq 0 ]; then
            echo "  ❌ МУШКИЛ:"
            echo "     Material3 TextField (filled:true) fillColor-ро"
            echo "     АЗ colorScheme.surfaceContainerHighest мегирад."
            echo "     Агар танзим нашуда бошад → Flutter default gray → ХОКИСТАРӢ!"
            echo ""
            echo "  ✅ ИСЛОҲ — ColorScheme.light-га илова кун:"
            echo "     surfaceContainerHighest: const Color(0xFF141420),"
          fi
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 4 — login_screen.dart: Container + TextField таҳлил
      # ════════════════════════════════════════════════════════════════════════
      - name: "📋 BUG #4 — login_screen Container vs TextField color conflict"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #4 — login_screen.dart Container/TextField конфликт    ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          FILE="lib/modules/auth/login_screen.dart"
          echo "  📄 $FILE"
          echo ""
          echo "  Container decoration colors:"
          grep -n "color: const Color\|color: Color" "$FILE" | head -10
          echo ""
          echo "  TextField fillColor:"
          grep -n "fillColor\|filled:" "$FILE"
          echo ""
          echo "  🔍 ТАҲЛИЛ:"
          echo "     Container color = 0xFF141420 (тира) ✅"
          echo "     TextField fillColor = 0xFF141420 (тира) — ЛЕК..."
          echo "     Material3 + filled:true → fillColor АЗ THEME оварда мешавад!"
          echo "     Container-и тира зери TextField-и ХОКИСТАРӢ пинҳон мешавад."
          echo ""
          echo "  ✅ ИСЛОҲ ДАҚИҚ — login_screen.dart-да иваз кун:"
          echo "     filled: true  →  filled: false"
          echo "     (Container худ ранги torик медиҳад, TextField ранг намехоҳад)"
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 5 — Splash timeout: сервер ҷавоб надиҳад → login → хокистарӣ
      # ════════════════════════════════════════════════════════════════════════
      - name: "⏱️ BUG #5 — Splash timeout too short for Render.com cold start"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #5 — Splash timeout: Render.com cold start             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          SPLASH="lib/modules/splash/splash_screen.dart"
          TIMEOUT_VAL=$(grep -oP 'Duration\(seconds: \K[0-9]+' "$SPLASH" | head -1 || echo "?")
          WAKEUP="lib/core/services/server_wakeup_service.dart"
          WAKEUP_TO=$(grep -oP 'Duration\(seconds: \K[0-9]+' "$WAKEUP" | head -1 || echo "?")

          echo "  Splash checkAuth timeout : ${TIMEOUT_VAL}s"
          echo "  ServerWakeup timeout     : ${WAKEUP_TO}s"
          echo "  Render.com cold start    : 30-50s"
          echo ""

          if [ "${TIMEOUT_VAL}" != "?" ] && [ "${TIMEOUT_VAL}" -lt 30 ] 2>/dev/null; then
            echo "  ❌ МУШКИЛ: Splash timeout (${TIMEOUT_VAL}s) < Render cold start (30-50s)"
            echo "     Сервер ҷавоб надиҳад → checkAuth fail → login → TextField хокистарӣ нишон"
            echo "     ИН БУҒИ ДУВВУМ аст ки экранро холӣ мекунад!"
            echo ""
            echo "  ✅ ИСЛОҲ:"
            echo "     .timeout(const Duration(seconds: ${TIMEOUT_VAL}))  →  .timeout(const Duration(seconds: 35))"
          else
            echo "  ✅ Timeout дуруст аст (${TIMEOUT_VAL}s)"
          fi

          # Wakeup blocking check
          if grep -q "unawaited\|_wakeUpBackground\|Future.microtask" "$WAKEUP" 2>/dev/null; then
            echo ""
            echo "  ❌ МУШКИЛ: wakeUp() background-да иҷро мешавад!"
            echo "     Splash мунтазир намемонад → auth пеш аз сервер кор мекунад"
          elif grep -q "await.*wakeUp\|ServerWakeupService.*wakeUp" lib/modules/splash/splash_screen.dart 2>/dev/null; then
            echo "  ✅ wakeUp() дар Splash await шудааст"
          else
            echo "  ⚠️  wakeUp() дар Splash await нашудааст — санҷед"
          fi
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 6 — withOpacity deprecated (Flutter 3.27+)
      # ════════════════════════════════════════════════════════════════════════
      - name: "⚠️ BUG #6 — withOpacity deprecated in Flutter 3.27+"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #6 — withOpacity() deprecated (Flutter 3.27+)         ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          COUNT=$(grep -rn "\.withOpacity(" lib/ --include="*.dart" | grep -v "//" | wc -l || true)
          echo "  withOpacity() истифодаҳо: $COUNT ҷой"
          echo ""

          if [ "$COUNT" -gt 0 ]; then
            echo "  ❌ МУШКИЛ: withOpacity() дар Flutter 3.27+ deprecated аст."
            echo "     Баъзе ҷойҳо render мушкил мешавад."
            echo ""
            echo "  Файлҳо:"
            grep -rln "\.withOpacity(" lib/ --include="*.dart" | while read f; do
              CNT=$(grep -c "\.withOpacity(" "$f" || true)
              echo "    $f → $CNT ҷой"
            done
            echo ""
            echo "  ✅ ИСЛОҲ: withOpacity(0.1) → withValues(alpha: 0.1)"
          else
            echo "  ✅ withOpacity истифода нашудааст."
          fi
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # БЛОКИ 7 — assets git-да нест
      # ════════════════════════════════════════════════════════════════════════
      - name: "🖼️ BUG #7 — Missing assets in git"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  BUG #7 — assets/ папка git-да нест                        ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""

          echo "  pubspec.yaml assets:"
          grep -A 10 "^  assets:" pubspec.yaml || echo "  (assets section not found)"
          echo ""

          echo "  git-да assets:"
          git ls-files assets/ 2>/dev/null || echo "  (нест)"
          echo ""

          TRACKED=$(git ls-files assets/ | wc -l)
          if [ "$TRACKED" -eq 0 ]; then
            echo "  ❌ МУШКИЛ: assets/ папка git-да commit нашудааст!"
            echo "     Flutter build-да crash → ин ҳам экранро холӣ мекунад"
            echo ""
            echo "  ✅ ИСЛОҲ:"
            echo "     mkdir assets"
            echo "     # product.png, banner.jpg, user.png гузоред"
            echo "     git add assets/"
            echo "     git commit -m 'fix: add assets'"
          else
            echo "  ✅ assets git-да мавҷуд аст ($TRACKED файл)"
          fi
          echo ""

      # ════════════════════════════════════════════════════════════════════════
      # ХУЛОСА — тартиби ислоҳ
      # ════════════════════════════════════════════════════════════════════════
      - name: "📋 ХУЛОСАИ УМУМӢ — тартиби ислоҳ"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              📋 ХУЛОСАИ ПУРРА                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ТАРТИБИ ИСЛОҲ (аз муҳимтарин то камтарин):"
          echo ""
          echo "  1️⃣  login_screen.dart [АСОСӢ]"
          echo "      filled: true  →  filled: false"
          echo "      (сатрҳои 87 ва 112)"
          echo ""
          echo "  2️⃣  app_theme.dart [АСОСӢ]"
          echo "      lightTheme ColorScheme-га илова кун:"
          echo "      surfaceContainerHighest: const Color(0xFF141420),"
          echo "      + inputDecorationTheme бо fillColor: Color(0xFF141420)"
          echo ""
          echo "  3️⃣  splash_screen.dart"
          echo "      .timeout(Duration(seconds: 8))  →  Duration(seconds: 35)"
          echo ""
          echo "  4️⃣  server_wakeup_service.dart"
          echo "      connectTimeout: 8s  →  55s"
          echo "      receiveTimeout: 8s  →  55s"
          echo ""
          echo "  5️⃣  assets/"
          echo "      mkdir assets && git add assets/ && git commit"
          echo ""
          echo "  6️⃣  40 ҷой withOpacity() → withValues(alpha: x)"
          echo ""
          echo "  ⚡ ФАВРТАРИН ИСЛОҲ (танҳо 2 тағйирот):"
          echo "     login_screen.dart: filled: true → filled: false"
          echo "     app_theme.dart: surfaceContainerHighest: Color(0xFF141420)"
          echo ""
          echo "════════════════════════════════════════════════════════════════"

      # ════════════════════════════════════════════════════════════════════════
      # ИСЛОҲИ АВТОМАТӢ — patch файлҳо ва artifact ҳамчун PR
      # ════════════════════════════════════════════════════════════════════════
      - name: "🔧 AUTO-FIX — Patch all bugs automatically"
        run: |
          echo "Applying automatic fixes..."

          # FIX 1: login_screen.dart — filled: true → filled: false
          sed -i 's/^\s*filled: true,$/                    filled: false,/g' \
            lib/modules/auth/login_screen.dart

          # FIX 2: register_screen.dart — same fix if exists
          [ -f lib/modules/auth/register_screen.dart ] && \
            sed -i 's/^\s*filled: true,$/                    filled: false,/g' \
              lib/modules/auth/register_screen.dart

          # FIX 3: withOpacity → withValues
          find lib/ -name "*.dart" -exec \
            sed -i 's/\.withOpacity(\([^)]*\))/.withValues(alpha: \1)/g' {} \;

          # FIX 4: splash timeout
          sed -i 's/Duration(seconds: 8)/Duration(seconds: 35)/g' \
            lib/modules/splash/splash_screen.dart 2>/dev/null || true

          # FIX 5: server wakeup timeout  
          WAKEUP="lib/core/services/server_wakeup_service.dart"
          if [ -f "$WAKEUP" ]; then
            sed -i 's/connectTimeout: const Duration(seconds: [0-9]*)/connectTimeout: const Duration(seconds: 55)/g' "$WAKEUP"
            sed -i 's/receiveTimeout: const Duration(seconds: [0-9]*)/receiveTimeout: const Duration(seconds: 55)/g' "$WAKEUP"
          fi

          # FIX 6: assets placeholder
          if [ ! -d "assets" ] || [ -z "$(ls -A assets 2>/dev/null)" ]; then
            mkdir -p assets
            PIXEL="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
            echo "$PIXEL" | base64 -d > assets/product.png
            echo "$PIXEL" | base64 -d > assets/banner.jpg
            echo "$PIXEL" | base64 -d > assets/user.png
            echo "✅ assets/ placeholder файлҳо сохта шуд."
          fi

          echo "✅ All auto-fixes applied."

      - name: "📤 Upload patched source as artifact"
        uses: actions/upload-artifact@v4
        with:
          name: TajikShop-Patched-Source
          path: |
            lib/modules/auth/login_screen.dart
            lib/modules/auth/register_screen.dart
            lib/modules/splash/splash_screen.dart
            lib/core/services/server_wakeup_service.dart
            lib/core/theme/app_theme.dart
            assets/
          retention-days: 14
