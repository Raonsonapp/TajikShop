name: 🔍 Diagnose & Fix White Screen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose-and-fix:
    name: Хатогиро пайдо ва ислоҳ кун
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Flutter ───────────────────────────────────────────────────────────
      - name: 🐦 Setup Flutter 3.29.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      # ── 3. Pub cache ─────────────────────────────────────────────────────────
      - name: 📦 Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}

      # ── 4. FIX: Assets папка ─────────────────────────────────────────────────
      - name: 🖼️ FIX — Create missing assets folder
        run: |
          echo "::group::📁 Checking assets..."
          if [ ! -d "assets" ]; then
            echo "❌ МУШКИЛ: assets/ папка вуҷуд надорад — экрани сафед!"
            mkdir -p assets
            PIXEL="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
            echo "$PIXEL" | base64 -d > assets/product.png
            echo "$PIXEL" | base64 -d > assets/banner.jpg
            echo "$PIXEL" | base64 -d > assets/user.png
            echo "✅ assets/ папка ва placeholder файлҳо сохта шуд."
          else
            for f in product.png banner.jpg user.png; do
              if [ ! -f "assets/$f" ]; then
                echo "❌ assets/$f нест — месозем..."
                PIXEL="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=="
                echo "$PIXEL" | base64 -d > "assets/$f"
              fi
            done
            echo "✅ assets/ файлҳо мавҷуданд."
          fi
          echo "::endgroup::"

      # ── 5. FIX: Render.com cold start — Splash timeout ───────────────────────
      - name: "⏱️ FIX — Render cold start: increase Splash timeout to 35s"
        run: |
          echo "::group::⏱️ Fixing Splash timeout..."
          SPLASH="lib/modules/splash/splash_screen.dart"
          if grep -q "Duration(seconds: 8)" "$SPLASH" 2>/dev/null; then
            sed -i 's/Duration(seconds: 8)/Duration(seconds: 35)/g' "$SPLASH"
            echo "✅ Splash timeout: 8s → 35s (Render.com cold start = 30-50s)"
          else
            echo "ℹ️  Splash timeout дигар 8s нест (шояд аллакай ислоҳ шудааст)"
          fi
          echo "::endgroup::"

      # ── 6. FIX: ServerWakeupService timeout ──────────────────────────────────
      - name: "🌐 FIX — ServerWakeupService: increase ping timeout"
        run: |
          echo "::group::🌐 Fixing ServerWakeupService..."
          WAKEUP="lib/core/services/server_wakeup_service.dart"
          if grep -q "Duration(seconds: 8)" "$WAKEUP" 2>/dev/null; then
            sed -i 's/connectTimeout: const Duration(seconds: 8)/connectTimeout: const Duration(seconds: 55)/g' "$WAKEUP"
            sed -i 's/receiveTimeout: const Duration(seconds: 8)/receiveTimeout: const Duration(seconds: 55)/g' "$WAKEUP"
            echo "✅ ServerWakeup timeout: 8s → 55s"
          else
            echo "ℹ️  ServerWakeup timeout шояд аллакай ислоҳ шудааст"
          fi
          # Ensure wakeUp() blocks (not background) — check for _wakeUpInBackground
          if grep -q "_wakeUpInBackground" "$WAKEUP" 2>/dev/null; then
            echo "⚠️  МУШКИЛ: wakeUp() background-га меравад — Splash мунтазир намемонад!"
            echo "   Лутфан server_wakeup_service.dart-ро мувофиқи README ислоҳ кунед."
          else
            echo "✅ wakeUp() blocking аст — Splash мунтазир мемонад."
          fi
          echo "::endgroup::"

      # ── 7. FIX: Android Gradle ────────────────────────────────────────────────
      - name: 🤖 FIX — Android Gradle & SDK versions
        run: |
          echo "::group::🤖 Fixing Android build files..."
          sed -i 's/id "com.android.application" version .*/id "com.android.application" version "8.3.0" apply false/' android/settings.gradle 2>/dev/null || true
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.10" apply false/' android/settings.gradle 2>/dev/null || true
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/' android/app/build.gradle 2>/dev/null || true
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle 2>/dev/null || true
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/' android/app/build.gradle 2>/dev/null || true
          grep -q 'ndkVersion' android/app/build.gradle || \
            sed -i '/compileSdk/a\    ndkVersion = "27.0.12077973"' android/app/build.gradle 2>/dev/null || true
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip|' \
            android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true
          echo "✅ Android Gradle ислоҳ шуд."
          echo "::endgroup::"

      # ── 8. FIX: Internet permission ───────────────────────────────────────────
      - name: 🔒 FIX — AndroidManifest & network_security_config
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q 'INTERNET' "$MANIFEST" || \
            sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>|' "$MANIFEST"
          grep -q 'networkSecurityConfig' "$MANIFEST" || \
            sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@mipmap/ic_launcher"\n        android:networkSecurityConfig="@xml/network_security_config"|' "$MANIFEST"
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <domain-config cleartextTrafficPermitted="false">
                  <domain includeSubdomains="true">tajikshop.onrender.com</domain>
                  <trust-anchors><certificates src="system"/></trust-anchors>
              </domain-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors><certificates src="system"/></trust-anchors>
              </base-config>
          </network-security-config>
          XML
          echo "✅ AndroidManifest + network_security_config ислоҳ шуд."

      # ── 9. pub get ────────────────────────────────────────────────────────────
      - name: 📥 Install dependencies
        run: flutter pub get

      # ── 10. DIAGNOSE: Analyze ─────────────────────────────────────────────────
      - name: 🔍 DIAGNOSE — Flutter analyze
        run: |
          echo "::group::🔍 Running flutter analyze..."
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze_output.txt
          ANALYZE_EXIT=$?
          set -e
          if [ "$ANALYZE_EXIT" -ne 0 ]; then
            echo "❌ ═══════════ ХАТОГИҲО ПАЙДО ШУД ═══════════"
            grep "error •" analyze_output.txt || true
            echo "════════════════════════════════════════════════"
          else
            echo "✅ Хатогии compile вуҷуд надорад."
          fi
          echo "::endgroup::"

      # ── 11. DIAGNOSE: Root cause report ──────────────────────────────────────
      - name: 🔬 DIAGNOSE — White screen root cause report
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║     🔬 ТАШХИС: САБАБҲОИ ЭКРАНИ САФЕД                   ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          # Check 1: assets in git
          if git ls-files assets/ | grep -q "product.png"; then
            echo "✅ assets/ — git-да commit шудааст"
          else
            echo "❌ САБАБИ №1: assets/ папка git-да нест!"
            echo "   ➡️  git add assets/ && git commit -m 'fix: add assets'"
          fi

          # Check 2: Splash timeout
          SPLASH_TIMEOUT=$(grep -oP 'Duration\(seconds: \K[0-9]+' lib/modules/splash/splash_screen.dart 2>/dev/null | head -1 || echo "?")
          if [ "$SPLASH_TIMEOUT" -ge 30 ] 2>/dev/null; then
            echo "✅ Splash timeout = ${SPLASH_TIMEOUT}s — Render cold start-ро пӯшад"
          else
            echo "❌ САБАБИ №2: Splash timeout = ${SPLASH_TIMEOUT}s — хеле кӯтоҳ!"
            echo "   Render.com cold start = 30-50s → timeout мезанад → экрани сафед"
            echo "   ➡️  Ислоҳ: timeout-ро то 35s зиёд кунед"
          fi

          # Check 3: wakeUp blocking
          if grep -q "_wakeUpInBackground" lib/core/services/server_wakeup_service.dart 2>/dev/null; then
            echo "❌ САБАБИ №3: wakeUp() background-га меравад!"
            echo "   Splash мунтазир намемонад — auth пеш аз сервер иҷро мешавад"
            echo "   ➡️  Ислоҳ: server_wakeup_service.dart-ро README мувофиқ иваз кунед"
          else
            echo "✅ wakeUp() blocking аст"
          fi

          # Check 4: Render cold start info
          echo ""
          echo "ℹ️  RENDER.COM FREE TIER:"
          echo "   Сервер баъд аз 15 дақиқаи бекорӣ «хоб» мекунад."
          echo "   Аввалин дархост = 30-50 сония интизор."
          echo "   ServerWakeupService ин мушкилро ҳал мекунад."
          echo ""
          echo "════════════════════════════════════════════════════════════"

      # ── 12. Java & Gradle cache ───────────────────────────────────────────────
      - name: 🏗️ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔨 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}

      # ── 13. Build APK ─────────────────────────────────────────────────────────
      - name: 🏗️ BUILD — Flutter APK
        run: |
          set +e
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee build_output.txt
          BUILD_EXIT=$?
          set -e
          if [ "$BUILD_EXIT" -eq 0 ]; then
            echo "✅ BUILD МУВАФФАҚ шуд!"
          else
            echo "❌ BUILD ХАТО:"
            tail -60 build_output.txt
            exit 1
          fi

      # ── 14. Upload APK ────────────────────────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TajikShop-Fixed-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 15. Summary ───────────────────────────────────────────────────────────
      - name: 📋 Summary
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║              📋 ХУЛОСАИ ИСЛОҲОТ                        ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "  🖼️  assets/ папка: сохта шуд"
          echo "  ⏱️  Splash timeout: 8s → 35s (Render cold start)"
          echo "  🌐  ServerWakeup: blocking mode + 55s timeout"
          echo "  🤖  Android Gradle: SDK 35, Gradle 8.7"
          echo "  🔒  INTERNET permission + network_security_config"
          echo ""
          echo "  📌 ИСЛОҲОТИ ДАСТӢ (1 маротиба):"
          echo "     1) Файлҳои ислоҳшударо аз workflow artifact гиред"
          echo "     2) git add assets/ lib/modules/splash/splash_screen.dart"
          echo "     3) git add lib/core/services/server_wakeup_service.dart"
          echo "     4) git commit -m 'fix: white screen — timeout + assets'"
          echo "     5) git push"
          echo ""
          echo "════════════════════════════════════════════════════════════"
