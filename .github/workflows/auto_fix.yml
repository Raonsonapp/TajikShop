name: 🔧 Auto Fix — Grey Screen

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ════════════════════════════════
      # FIX 1: launch_background.xml
      # ════════════════════════════════
      - name: "🖤 FIX 1 — Android launch screen siyoh"
        run: |
          cat > android/app/src/main/res/drawable/launch_background.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@color/launch_background_color" />
          </layer-list>
          XML
          echo "✅ launch_background.xml isloh shud"

      # ════════════════════════════════
      # FIX 2: styles.xml — Light → Dark
      # ════════════════════════════════
      - name: "🎨 FIX 2 — Android styles Light to Dark"
        run: |
          cat > android/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@color/launch_background_color</item>
              </style>
          </resources>
          XML
          echo "✅ styles.xml isloh shud"

      # ════════════════════════════════
      # FIX 3: colors.xml — #0A0A0F
      # ════════════════════════════════
      - name: "🎨 FIX 3 — colors.xml launch color"
        run: |
          cat > android/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="launch_background_color">#0A0A0F</color>
          </resources>
          XML
          echo "✅ colors.xml isloh shud"

      # ════════════════════════════════
      # FIX 4: login_screen.dart — filled:false
      # ════════════════════════════════
      - name: "📝 FIX 4 — login_screen TextField filled false"
        run: |
          python3 << 'PYEOF'
          import re

          with open('lib/modules/auth/login_screen.dart', 'r') as f:
              c = f.read()

          # filled:true + fillColor -> filled:false
          c = re.sub(
              r'filled: true,\s*\n\s*fillColor: (?:const )?Color\([^)]+\),',
              'filled: false,',
              c
          )

          with open('lib/modules/auth/login_screen.dart', 'w') as f:
              f.write(c)

          count = c.count('filled: false')
          print(f"✅ login_screen.dart: {count} TextField isloh shud")
          PYEOF

      # ════════════════════════════════
      # Commit
      # ════════════════════════════════
      - name: "💾 Commit fixes"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/res/drawable/launch_background.xml
          git add android/app/src/main/res/values/styles.xml
          git add android/app/src/main/res/values/colors.xml
          git add lib/modules/auth/login_screen.dart
          git diff --cached --quiet && echo "Hech chiz o'zgarmadi" && exit 0
          git commit -m "fix: grey screen — dark launch theme + login TextField"
          git push
          echo "✅ Push shud!"

      # ════════════════════════════════
      # Build APK
      # ════════════════════════════════
      - name: "🏗️ Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: "🐦 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: "📦 pub get"
        run: flutter pub get

      - name: "🔨 Build APK"
        run: flutter build apk --release --no-tree-shake-icons

      - name: "📤 Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: TajikShop-Fixed
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
