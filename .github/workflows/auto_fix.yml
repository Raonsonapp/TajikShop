name: "Fix Grey Screen"

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix launch_background.xml
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<layer-list xmlns:android="http://schemas.android.com/apk/res/android">' \
            '    <item android:drawable="@color/launch_background_color" />' \
            '</layer-list>' \
            > android/app/src/main/res/drawable/launch_background.xml
          echo "Done: launch_background.xml"

      - name: Fix styles.xml
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">' \
            '        <item name="android:windowBackground">@drawable/launch_background</item>' \
            '    </style>' \
            '    <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">' \
            '        <item name="android:windowBackground">@color/launch_background_color</item>' \
            '    </style>' \
            '</resources>' \
            > android/app/src/main/res/values/styles.xml
          echo "Done: styles.xml"

      - name: Fix colors.xml
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="launch_background_color">#0A0A0F</color>' \
            '</resources>' \
            > android/app/src/main/res/values/colors.xml
          echo "Done: colors.xml"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/res/drawable/launch_background.xml
          git add android/app/src/main/res/values/styles.xml
          git add android/app/src/main/res/values/colors.xml
          git diff --cached --quiet && echo "Nothing changed" && exit 0
          git commit -m "fix: dark launch theme - no more grey screen"
          git push
          echo "All 3 files committed and pushed!"
