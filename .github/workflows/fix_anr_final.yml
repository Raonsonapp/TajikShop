name: "Fix ANR — Push All Files"

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix theme_provider.dart
        run: |
          cat > lib/providers/theme_provider.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_riverpod/flutter_riverpod.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          const _kKey = 'app_theme_mode';

          class ThemeNotifier extends StateNotifier<ThemeMode> {
            ThemeNotifier() : super(ThemeMode.dark) {
              _load();
            }
            Future<void> _load() async {
              try {
                final p = await SharedPreferences.getInstance();
                if (mounted) state = p.getString(_kKey) == 'light' ? ThemeMode.light : ThemeMode.dark;
              } catch (_) {}
            }
            void toggle() { state = state == ThemeMode.dark ? ThemeMode.light : ThemeMode.dark; _save(); }
            void setDark()  { state = ThemeMode.dark;  _save(); }
            void setLight() { state = ThemeMode.light; _save(); }
            void _save() {
              SharedPreferences.getInstance().then((p) =>
                  p.setString(_kKey, state == ThemeMode.dark ? 'dark' : 'light'));
            }
          }
          final themeProvider = StateNotifierProvider<ThemeNotifier, ThemeMode>((ref) => ThemeNotifier());
          EOF

      - name: Fix locale_provider.dart
        run: |
          cat > lib/providers/locale_provider.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter_riverpod/flutter_riverpod.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          const _kLangKey = 'app_language';

          class LocaleNotifier extends StateNotifier<Locale> {
            LocaleNotifier() : super(const Locale('tg')) { _load(); }
            Future<void> _load() async {
              try {
                final p = await SharedPreferences.getInstance();
                if (mounted) state = Locale(p.getString(_kLangKey) ?? 'tg');
              } catch (_) {}
            }
            Future<void> setLocale(Locale locale) async {
              state = locale;
              try {
                final p = await SharedPreferences.getInstance();
                await p.setString(_kLangKey, locale.languageCode);
              } catch (_) {}
            }
            static const supported = [Locale('tg'), Locale('ru'), Locale('en')];
            static String langName(String code) {
              switch (code) {
                case 'tg': return '\u{1F1F9}\u{1F1EF} \u0422\u043E\u04B7\u0438\u043A\u04E3';
                case 'ru': return '\u{1F1F7}\u{1F1FA} \u0420\u0443\u0441\u0441\u043A\u0438\u0439';
                case 'en': return '\u{1F1EC}\u{1F1E7} English';
                default: return code;
              }
            }
          }
          final localeProvider = StateNotifierProvider<LocaleNotifier, Locale>((ref) => LocaleNotifier());
          EOF

      - name: Fix network_service.dart
        run: |
          cat > lib/core/services/network_service.dart << 'EOF'
          import 'dart:async';
          import 'package:flutter/foundation.dart';
          import 'package:connectivity_plus/connectivity_plus.dart';

          class NetworkService {
            NetworkService._();
            static final NetworkService instance = NetworkService._();
            final ValueNotifier<bool> isOnlineNotifier = ValueNotifier(true);
            bool get isOnline => isOnlineNotifier.value;
            StreamSubscription? _sub;
            void init() {
              _sub = Connectivity().onConnectivityChanged.listen((results) {
                final online = !results.contains(ConnectivityResult.none);
                if (isOnlineNotifier.value != online) {
                  isOnlineNotifier.value = online;
                  debugPrint('[Network] \${online ? "Online" : "Offline"}');
                }
              });
            }
            void dispose() { _sub?.cancel(); }
          }
          EOF

      - name: Fix main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:flutter_localizations/flutter_localizations.dart';
          import 'package:flutter_riverpod/flutter_riverpod.dart';
          import 'core/theme/app_theme.dart';
          import 'providers/theme_provider.dart';
          import 'providers/locale_provider.dart';
          import 'routes/app_router.dart';
          import 'core/app_l10n.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setPreferredOrientations(
                [DeviceOrientation.portraitUp, DeviceOrientation.portraitDown]);
            SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
                statusBarColor: Colors.transparent,
                statusBarIconBrightness: Brightness.light));
            runApp(const ProviderScope(child: TajikShopApp()));
          }

          class TajikShopApp extends ConsumerWidget {
            const TajikShopApp({super.key});
            @override
            Widget build(BuildContext context, WidgetRef ref) {
              final router    = ref.watch(routerProvider);
              final themeMode = ref.watch(themeProvider);
              final locale    = ref.watch(localeProvider);
              return MaterialApp.router(
                debugShowCheckedModeBanner: false,
                title: 'TajikShop',
                theme:        AppTheme.lightTheme,
                darkTheme:    AppTheme.darkTheme,
                themeMode:    themeMode,
                locale:       locale,
                routerConfig: router,
                localizationsDelegates: const [
                  AppLocalizationsDelegate(),
                  GlobalMaterialLocalizations.delegate,
                  GlobalWidgetsLocalizations.delegate,
                  GlobalCupertinoLocalizations.delegate,
                ],
                supportedLocales: LocaleNotifier.supported,
              );
            }
          }
          EOF

      - name: Fix api_client.dart timeouts
        run: |
          sed -i 's/connectTimeout: const Duration(seconds: [0-9]*)/connectTimeout: const Duration(seconds: 5)/g' lib/core/api/api_client.dart
          sed -i 's/receiveTimeout: const Duration(seconds: [0-9]*)/receiveTimeout: const Duration(seconds: 5)/g' lib/core/api/api_client.dart
          sed -i 's/sendTimeout: const Duration(minutes: [0-9]*)/sendTimeout: const Duration(seconds: 8)/g' lib/core/api/api_client.dart
          sed -i 's/sendTimeout: const Duration(seconds: [0-9]*)/sendTimeout: const Duration(seconds: 8)/g' lib/core/api/api_client.dart

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/providers/theme_provider.dart
          git add lib/providers/locale_provider.dart
          git add lib/core/services/network_service.dart
          git add lib/main.dart
          git add lib/core/api/api_client.dart
          git diff --cached --quiet && echo "Nothing changed" && exit 0
          git commit -m "fix: ANR — remove all blocking operations"
          git push
          echo "All files pushed!"
