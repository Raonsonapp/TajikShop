name: tajikshop
description: TajikShop Marketplace App - Бозори Тоҷикистон
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.1

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/product.png
    - assets/banner.jpg
    - assets/user.png
